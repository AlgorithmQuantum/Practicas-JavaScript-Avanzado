<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro con Validación Zod</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        label .required {
            color: #f44336;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        input.error {
            border-color: #f44336;
            background: #fff5f5;
        }

        input.success {
            border-color: #4CAF50;
            background: #f5fff5;
        }

        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #f44336;
            font-size: 0.85em;
            margin-top: 5px;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .error-message::before {
            content: '⚠️ ';
        }

        .error-message:empty::before {
            content: '';
        }

        .password-hint {
            display: block;
            color: #666;
            font-size: 0.8em;
            margin-top: 5px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .password-hint strong {
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            margin-top: 20px;
            text-align: center;
        }

        .success-message h3 {
            margin-bottom: 10px;
        }

        .success-message .data-display {
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .loading-spinner::after {
            content: '⏳';
            font-size: 1.5em;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.9em;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Registro de Usuario</h1>
        <p class="subtitle">Validación de datos con <strong>Zod</strong></p>

        <!-- Formulario -->
        <form id="registrationForm" novalidate>
            <div class="form-group">
                <label for="nombre">
                    Nombre completo <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre" 
                    placeholder="Ej: Juan Pérez"
                    autocomplete="name"
                    required
                >
                <div class="error-message" id="nombre-error"></div>
            </div>

            <div class="form-group">
                <label for="email">
                    Correo electrónico <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="ejemplo@correo.com"
                    autocomplete="email"
                    required
                >
                <div class="error-message" id="email-error"></div>
            </div>

            <div class="form-group">
                <label for="password">
                    Contraseña <span class="required">*</span>
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 8 caracteres"
                    autocomplete="new-password"
                    required
                >
                <small class="password-hint">
                    <strong>Requisitos:</strong> Mínimo 8 caracteres, al menos una mayúscula, 
                    una minúscula y un número
                </small>
                <div class="error-message" id="password-error"></div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                🚀 Registrarse
            </button>
        </form>

        <div class="divider">o</div>

        <button class="btn btn-secondary" id="testValidBtn">
            🔍 Probar Validación (sin enviar)
        </button>

        <div class="loading-spinner" id="loadingSpinner">Procesando...</div>

        <!-- Mensaje de éxito -->
        <div class="success-message" id="successMessage">
            <h3>✅ ¡Registro Exitoso!</h3>
            <p>Los datos han sido validados correctamente.</p>
            <div class="data-display" id="dataDisplay"></div>
            <button class="btn btn-secondary" onclick="location.reload()" style="margin-top: 15px;">
                🔄 Nuevo Registro
            </button>
        </div>
    </div>

    <!-- Incluir Zod desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/zod@3.22.4/lib/index.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
